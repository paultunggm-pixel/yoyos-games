<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>YoYo's Games</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:-apple-system,"PingFang SC","SF Pro Display","Helvetica Neue",sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}

.page{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;padding:48px 14px 24px;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* 品牌 */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:4px;flex-shrink:0}
.brand img{width:44px;height:44px;border-radius:10px}
.brand .bn{font-size:20px;font-weight:700;letter-spacing:.04em;background:linear-gradient(135deg,#ff375f,#ff9f0a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tagline{font-size:13px;color:#8e8e93;margin-bottom:28px;flex-shrink:0}

/* 九宫格 */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:460px;flex-shrink:0}
.grid a{text-decoration:none}

.cell{display:flex;flex-direction:column;align-items:center;gap:6px}
.cell .icon-box{width:100%;aspect-ratio:1;background:#1c1c1e;border:1.5px solid #2c2c2e;border-radius:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s;position:relative}
.cell .icon-box:active{transform:scale(.96);opacity:.85}
.cell .icon-box:hover{border-color:#ff9f0a}
.cell .name{font-size:12px;font-weight:600;color:#fff;text-align:center;line-height:1.2}
.cell .stat{font-size:10px;color:#8e8e93;text-align:center;margin-top:-2px}

/* 已上线卡片 */
.cell.live .icon-box{border-color:#3a3a3c}
.cell.live .icon-box:hover{border-color:#ff9f0a}

/* 未上线卡片 */
.cell.soon .icon-box{border:1.5px solid rgba(44,44,46,.4);opacity:.4;filter:grayscale(.6);cursor:default}
.cell.soon .icon-box:hover{border-color:rgba(44,44,46,.4)}
.cell.soon .icon-box:active{transform:none;opacity:.4}
.cell.soon .name{color:#4a4a4e}

@media(max-width:400px){
  .grid{gap:8px;max-width:340px}
  .cell{gap:4px}
  .cell .icon-box{border-radius:12px}
  .cell .name{font-size:10px}
  .page{padding:36px 10px 20px}
  .brand img{width:36px;height:36px}
  .brand .bn{font-size:17px}
}
</style>
</head>
<body>
<div class="page">
  <div class="brand">
    <img src="logo.png" alt="">
    <span class="bn">YoYo's Games</span>
  </div>
  <div class="tagline">和小伙伴们比比谁更厉害！</div>
  <div class="grid">
    <!-- 俄罗斯方块 -->
    <a class="cell live" href="https://paultunggm-pixel.github.io/tetris/">
      <div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(2,18px);gap:3px"><i style="width:18px;height:18px;border-radius:6px;background:#67e8f9"></i><i style="width:18px;height:18px;border-radius:6px;background:#c084fc"></i><i style="width:18px;height:18px;border-radius:6px;background:#fde047"></i><i style="width:18px;height:18px;border-radius:6px;background:#4ade80"></i></i></div>
      <span class="name">俄罗斯方块</span>
      <span class="stat" id="tScore">—</span>
    </a>
    <!-- 开心消消乐 -->
    <a class="cell live" href="https://paultunggm-pixel.github.io/candy/">
      <div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,14px);gap:3px"><i style="width:14px;height:14px;border-radius:50%;background:#ff6b6b"></i><i style="width:14px;height:14px;border-radius:50%;background:#ff9f43"></i><i style="width:14px;height:14px;border-radius:50%;background:#feca57"></i><i style="width:14px;height:14px;border-radius:50%;background:#a29bfe"></i><i style="width:14px;height:14px;border-radius:50%;background:#74b9ff"></i><i style="width:14px;height:14px;border-radius:50%;background:#fd79a8"></i></i></div>
      <span class="name">开心消消乐</span>
      <span class="stat" id="cScore">—</span>
    </a>
    <!-- 虚位以待 × 7 -->
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">泡泡龙</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">贪吃蛇</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">飞机大战</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">坦克大战</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">小赛车</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">超级玛丽</span></div>
    <div class="cell soon"><div class="icon-box"><i style="display:inline-grid;grid-template-columns:repeat(3,12px);gap:2px"><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i><i style="width:12px;height:12px;border-radius:50%;background:#4a4a4e"></i></i></div><span class="name">植物大战僵尸</span></div>
  </div>
</div>

<script src="https://gosspublic.alicdn.com/aliyun-oss-sdk-6.18.1.min.js"></script>
<script>
// 加载两个游戏的最高分显示在卡片上
let oss=null;
const OSS_BASE='https://tetris-data.oss-cn-hangzhou.aliyuncs.com';
async function initOSS(){if(oss)return;try{var r=await fetch(OSS_BASE+'/config.json',{cache:'no-cache'});var c=await r.json();oss=new OSS({region:'oss-cn-hangzhou',accessKeyId:c.ak,accessKeySecret:c.sk,bucket:'tetris-data'})}catch(e){}}

async function loadScores(){
  try{await initOSS();if(!oss)return;
    // 俄罗斯方块
    try{var tr=await oss.get('players.json');var tp=JSON.parse(tr.content.toString());
      var tBest=0;Object.values(tp).forEach(function(p){if(p.best>tBest)tBest=p.best});
      if(tBest>0)document.getElementById('tScore').textContent='最高 '+tBest.toLocaleString()+' 分';
    }catch(e){}
    // 消消乐
    try{var cr=await oss.get('candy_players.json');var cp=JSON.parse(cr.content.toString());
      var cBest=0;Object.values(cp).forEach(function(p){if(p.best>cBest)cBest=p.best});
      if(cBest>0)document.getElementById('cScore').textContent='最高 '+cBest.toLocaleString()+' 分';
    }catch(e){}
  }catch(e){}
}
loadScores();
</script>
</body>
</html>
